name: Release

# Release automation via release-please.
#
# Flow:
#   1. On each push to `master`, release-please maintains a "Release PR" that
#      bumps the version in package.json + package-lock.json and updates
#      CHANGELOG.md, based on Conventional Commit messages since the last
#      release (fix: -> patch, feat: -> minor, ! / BREAKING CHANGE -> major).
#      Commits like chore:/docs:/ci: do NOT trigger a release on their own.
#   2. When you merge that Release PR, release-please creates the git tag and
#      GitHub Release, and the `publish` job pushes the package to npm via
#      OIDC trusted publishing (automatic provenance, no token stored).
#
# Because the version lives in committed files updated through the Release PR,
# package.json stays in sync with what is published, and nothing is ever
# pushed directly to the protected `master` branch.
#
# Required setup (one-time):
#   - npm trusted publisher: configured for this repo + release.yml, scoped to
#     the `deploy` environment. No NPM_TOKEN secret is needed.
#   - GitHub environment `deploy` must exist (Settings -> Environments).

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    # Must match the environment configured on the npm trusted publisher.
    environment: deploy
    permissions:
      contents: read
      id-token: write   # OIDC token for npm trusted publishing + provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # Authenticated via OIDC trusted publishing; no NODE_AUTH_TOKEN needed.
      - name: Publish to npm
        run: npm publish
