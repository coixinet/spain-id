version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    # Use a conventional-commit prefix so release-please ignores these
    # (dependency bumps are dev-only here and must not trigger a release).
    commit-message:
      prefix: chore
    # Collapse the many dev-dependency advisories into a single PR.
    groups:
      dev-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      github-actions:
        patterns:
          - "*"
