version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    # Use a conventional-commit prefix so release-please ignores these
    # (dependency bumps are dev-only here and must not trigger a release).
    commit-message:
      prefix: chore
    # Collapse the many dev-dependency advisories into a single PR.
    groups:
      dev-dependencies:
        patterns:
          - "*"
    ignore:
      # neostandard's eslint peer dependency is currently ^9. Hold eslint at
      # 9 until neostandard ships eslint 10 support, then bump them together
      # manually (a major eslint bump alone breaks `npm ci`).
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      github-actions:
        patterns:
          - "*"
